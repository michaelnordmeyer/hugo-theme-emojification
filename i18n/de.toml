# https://gohugo.io/functions/dateformat/

[atom_feed]
  category_all_postfix = 'Alle'

[author]
  bio = 'Dies ist die Biographie, welche sich in der jeweiligen internationalisierten .toml Konfigurationsdatei im Verziechnis i18n dieses Themes befindet'

[homelink]
  title = 'Home'
  aria_label = 'Home Link'

  [homelink.category]
    title = 'Kategorie Home'
    aria_label = 'Kategorie Home Link'

  [homelink.tag]
    title = 'Tag Home'
    aria_label = 'Tag Home Link'

[posts]
  [posts.date]
    other = '2006-01-02'

[post]
  [post.created]
    other = '2006-01-02'

  [post.updated]
    other = 'Aktualisiert 2006-01-02'

[redirect_page]
  title = 'Weiterleitung…'
  to = 'Weiterleitung nach'
